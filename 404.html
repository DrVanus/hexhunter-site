<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0C0A14">
  <title>Lost in the dark — Hexhunter</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="app-icon-512.png?v=20260711a">
  <link rel="apple-touch-icon" href="app-icon-512.png?v=20260711a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0C0A14; color: #ECE7F5;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px; -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 90% 50% at 15% -5%, rgba(139,92,246,0.16), transparent 55%),
        radial-gradient(ellipse 80% 55% at 50% 108%, rgba(109,40,217,0.14), transparent 65%);
    }
    .wrap { max-width: 460px; }
    img { width: 92px; height: 92px; border-radius: 22px; margin-bottom: 26px; box-shadow: 0 0 40px rgba(139,92,246,0.35); }
    h1 { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 800; letter-spacing: 0.01em; margin-bottom: 12px; }
    p { color: #A99EC2; margin-bottom: 28px; line-height: 1.6; }
    a.btn {
      display: inline-block; padding: 14px 28px;
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      color: #fff; font-weight: 800; border-radius: 12px; text-decoration: none;
      box-shadow: 0 10px 30px rgba(139,92,246,0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="app-icon-512.png?v=20260711a" alt="Hexhunter">
    <h1>You've wandered too deep.</h1>
    <p>This crypt is empty — whatever you were hunting isn't here. Find your way back to the light.</p>
    <a class="btn" href="index.html">Return to Hexhunter →</a>
  </div>
</body>
</html>
